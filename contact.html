<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2269008589730162"
      crossorigin="anonymous"
    ></script>
    <meta name="description" content="Contact Akkous via WhatsApp for any request." />
    <meta name="robots" content="index,follow" />
    <meta name="google-adsense-account" content="ca-pub-2269008589730162" />

    <title>Contact — Akkous</title>
    <link rel="canonical" href="https://akkous.com/contact.html" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <header class="site-header" role="banner">
      <nav class="nav container" aria-label="Primary">
        <a class="nav__brand" href="index.html">Akkous</a>
      </nav>
    </header>

    <main class="legal-page container" id="main-content">
      <section class="legal-page__content">
        <h1>Contact</h1>
        <p>Send your request through this form. Your message will be sent to WhatsApp.</p>

        <div class="contact-card">
          <form class="contact-form" id="contact-form" novalidate>
            <div class="contact-form__field">
              <label for="contact-name">Name</label>
              <input id="contact-name" name="name" type="text" required />
            </div>
            <div class="contact-form__field">
              <label for="contact-email">Email</label>
              <input id="contact-email" name="email" type="email" required />
            </div>
            <div class="contact-form__field">
              <label for="contact-subject">Subject</label>
              <input id="contact-subject" name="subject" type="text" required />
            </div>
            <div class="contact-form__field">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" name="message" required></textarea>
            </div>
            <div class="contact-form__actions">
              <button type="submit" class="newsletter__btn">Send via WhatsApp</button>
              <a
                class="contact-whatsapp-link"
                href="https://wa.me/212630230803"
                target="_blank"
                rel="noopener noreferrer"
              >Open WhatsApp directly</a>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="container">
        <div class="footer__top">
          <a class="footer__brand" href="index.html">Akkous</a>
          <nav class="footer__nav" aria-label="Footer">
            <a href="index.html">Home</a>
            <a href="conditions-utilisation.html">Terms of use</a>
            <a href="politique-confidentialite.html">Privacy policy</a>
            <a href="contact.html">Contact</a>
          </nav>
        </div>
        <div class="footer__bottom">
          <p>© <span id="footer-year">2026</span> Akkous — From your kitchen to the world</p>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById("footer-year").textContent = new Date().getFullYear();
      document.getElementById("contact-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var name = document.getElementById("contact-name").value.trim();
        var email = document.getElementById("contact-email").value.trim();
        var subject = document.getElementById("contact-subject").value.trim();
        var message = document.getElementById("contact-message").value.trim();
        if (!name || !email || !subject || !message) return;

        var text = [
          "New message from Akkous",
          "Name: " + name,
          "Email: " + email,
          "Subject: " + subject,
          "",
          "Message:",
          message,
        ].join("\n");
        var url = "https://wa.me/212630230803?text=" + encodeURIComponent(text);
        window.open(url, "_blank", "noopener");
      });
    </script>
  </body>
</html>
